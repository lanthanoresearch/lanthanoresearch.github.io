<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Research</title>

<style>
body{
    margin:0;
    background:#111;
    color:#eee;
    font-family:Arial,sans-serif;
}

    #searchBox{
    width:100%;
    box-sizing:border-box;
    padding:14px;
    margin-bottom:20px;
    background:#222;
    color:#fff;
    border:none;
    border-radius:8px;
    font-size:16px;
}
    
section{
    max-width:1000px;
    margin:auto;
    padding:40px 20px;
}

h1{
    text-align:center;
    margin-bottom:40px;
}
.info-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:-20px;
    margin-bottom:35px;
}

#paperCount{
    margin:0;
    color:#777;
}
.sort-container{
    text-align:center;
    margin-bottom:30px;
}

#sortSelect{
    background:#222;
    color:#eee;
    border:none;
    border-radius:8px;
    padding:10px 18px;
    font-size:.95em;
    cursor:pointer;
}

#sortSelect:hover{
    background:#262626;
}

#sortSelect:focus{
    outline:none;
    border-color:#555;
}

    
.back{
    color:white;
    text-decoration:none;
    display:inline-block;
    margin-bottom:20px;
}

.card{
    background:#1d1d1d;
    padding:20px;
    margin:15px 0;
    border-radius:10px;
}

.card-description{
    color:#aaa;
    font-size:0.9em;
    margin-top:10px;
    line-height:1.4;
}

.card-date{
    color:#777;
    font-size:0.8em;
    margin-top:10px;
}

.button{
    display:inline-block;
    background:#333;
    color:white;
    text-decoration:none;
    padding:10px 15px;
    border-radius:6px;
    margin-right:10px;
    margin-top:10px;
}

.button:hover{
    background:#444;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    margin-top:15px;
}

.gallery img{
    width:100%;
    aspect-ratio:1/1;
    object-fit:cover;
    border-radius:8px;
    cursor:pointer;
}

details{
    margin-top:20px;
}

summary{
    cursor:pointer;
    font-size:1.1em;
    font-weight:bold;
    padding:12px;
    background:#222;
    border-radius:8px;
}

summary:hover{
    background:#2a2a2a;
}
</style>
</head>

<body>

<section>

<a class="back" href="index.html">◀ Home</a>

    <h1 id="pageTitle">Loading...</h1>
<input
    type="text"
    id="searchBox"
    placeholder="Search all research..."
>
<div class="info-bar">

<p id="paperCount"></p>

<select id="sortSelect">

<option value="az">A-Z</option>
<option value="za">Z-A</option>

<option value="newest">Newest</option>
<option value="oldest">Oldest</option>

<option value="mostimages">Most Images</option>
<option value="leastimages">Least Images</option>

</select>

</div>



<div id="research-container"></div>

</section>

<script>
    let fuse = null;
let searchIndex = null;
const params =
    new URLSearchParams(window.location.search);
let fuse = null;
let searchIndex = [];
const currentCategory =
    params.get("category");

document.querySelector("h1").textContent =
    currentCategory === "all"
        ? "All Research"
        : currentCategory.charAt(0).toUpperCase() +
          currentCategory.slice(1);

    fetch("search-index.json")
.then(response => response.json())
.then(data => {

    searchIndex = data;

    fuse = new Fuse(data, {
        includeScore: true,
        threshold: 0.35,
        ignoreLocation: true,
        minMatchCharLength: 2,
        keys: [
            "title",
            "searchText"
        ]
    });

    console.log("Search index loaded");

});
    
fetch("descriptions.json")
.then(response => response.json())
.then(data => {

    const container =
        document.getElementById("research-container");

    let papers =
    Object.entries(data);

    papers.sort((a,b)=>
        a[1].title.localeCompare(b[1].title)
    );
function renderPapers(){

container.innerHTML = "";

let filteredPapers = papers;([key,paper]) =>
    const query =
    document
        .getElementById("searchBox")
        .value
        .trim();


    if(query && fuse){

    const searchResults =
        fuse.search(query);

    const allowedTitles =
        new Set(
            searchResults.map(
                result => result.item.title
            )
        );

    filteredPapers =
        filteredPapers.filter(
            ([key,paper]) =>
                allowedTitles.has(
                    paper.title
                )
        );

}


    
    currentCategory === "all" ||

    (
        paper.category &&
        paper.category.includes(currentCategory)
    )

);

const sortType =
    document.getElementById("sortSelect").value;

if(sortType === "az"){

    filteredPapers.sort((a,b)=>
        a[1].title.localeCompare(b[1].title)
    );

}
else if(sortType === "za"){

    filteredPapers.sort((a,b)=>
        b[1].title.localeCompare(a[1].title)
    );

}
else if(sortType === "newest"){

    filteredPapers.sort((a,b)=>
        b[1].updated.localeCompare(a[1].updated)
    );

}
else if(sortType === "oldest"){

    filteredPapers.sort((a,b)=>
        a[1].updated.localeCompare(b[1].updated)
    );

}
else if(sortType === "mostimages"){

    filteredPapers.sort((a,b)=>
        (b[1].images?.length || 0) -
        (a[1].images?.length || 0)
    );

}
else if(sortType === "leastimages"){

    filteredPapers.sort((a,b)=>
        (a[1].images?.length || 0) -
        (b[1].images?.length || 0)
    );

}

document.getElementById("paperCount").textContent =
    filteredPapers.length +
    (filteredPapers.length === 1 ? " Paper" : " Papers");

filteredPapers.forEach(([key,paper]) => {
if(
    currentCategory !== "all" &&
    (
        !paper.category ||
        !paper.category.includes(currentCategory)
    )
){
    return;
}
        let galleryHtml = "";

        if(paper.images && paper.images.length){

            galleryHtml = `
                <details>
                    <summary>Supporting Images (${paper.images.length})</summary>

                    <div class="gallery">

                        ${paper.images.map(image => `
                            <a href="${image}" target="_blank">
                                <img src="${image}" loading="lazy">
                            </a>
                        `).join("")}

                    </div>
                </details>
            `;

        }

        let cardHtml = "";

        if(paper.warning){
            cardHtml = `
            <div class="card">

                <h2>${paper.title}</h2>

                <p class="card-description">
                    ${paper.description}
                </p>

                <p class="card-date">
                    Created: ${parseInt(paper.updated.split("-")[1])}-${
parseInt(paper.updated.split("-")[2])}-${
paper.updated.split("-")[0]}
                </p>

                <div id="warning-${key}">

                    <p>
                    CONTENT WARNING: This paper and/or its supporting images contain graphic content, including depictions of severe injuries, death, or war casualties.
                    </p>

                    <a class="button"
                       href="#"
                       onclick="showWarningContent('${key}'); return false;"
                       I Understand, Show Content
                    </a>

                </div>

                <div id="content-${key}"
     style="display:none;">

                    <a class="button"
                       href="${paper.url}"
                       target="_blank">
                       Read PDF
                    </a>

                    <a class="button"
                       href="${paper.url}"
                       download>
                       Download PDF
                    </a>

                    ${galleryHtml}

                </div>

            </div>
            `;

        }else{

            cardHtml = `
            <div class="card">

                <h2>${paper.title}</h2>

                <p class="card-description">
                    ${paper.description}
                </p>

                <p class="card-date">
                    Created: ${parseInt(paper.updated.split("-")[1])}-${
parseInt(paper.updated.split("-")[2])}-${
paper.updated.split("-")[0]}
                </p>

                <a class="button"
                   href="${paper.url}"
                   target="_blank">
                   Read PDF
                </a>

                <a class="button"
                   href="${paper.url}"
                   download>
                   Download PDF
                </a>

                ${galleryHtml}

            </div>
            `;

        }

        container.innerHTML += cardHtml;

});

}

const sortSelect =
    document.getElementById("sortSelect");

const savedSort =
    localStorage.getItem("paperSort");

if(savedSort){
    sortSelect.value = savedSort;
}

renderPapers();

sortSelect.addEventListener("change", () => {

    localStorage.setItem(
        "paperSort",
        sortSelect.value
    );

    renderPapers();

});
});

    
document
.getElementById("searchBox")
.addEventListener(
    "input",
    renderPapers
);

    
function showWarningContent(key){

    document.getElementById(
        "warning-" + key
    ).style.display = "none";

    document.getElementById(
        "content-" + key
    ).style.display = "block";

}

</script>
</script>

<script src="https://cdn.jsdelivr.net/npm/fuse.js@7.4.2/dist/fuse.min.js"></script>

</body>
</html>
</body>
</html>
