<!DOCTYPE html>
<html>
<head>
    <link rel="icon" type="image/png" href="file_000000000c40722f92b1fe6758cb4855.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Research</title>

<style>
body{
    margin:0;
    background:#111;
    color:#eee;
    font-family:Arial,sans-serif;
}

section{
    max-width:1000px;
    margin:auto;
    padding:40px 20px;
}

h1{
    text-align:center;
    margin-bottom:40px;
}
.info-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:-20px;
    margin-bottom:35px;
}

#paperCount{
    margin:0;
    color:#777;
}
.sort-container{
    text-align:center;
    margin-bottom:30px;
}

#sortSelect{
    background:#222;
    color:#eee;
    border:none;
    border-radius:8px;
    padding:10px 18px;
    font-size:.95em;
    cursor:pointer;
}

#sortSelect:hover{
    background:#262626;
}

#sortSelect:focus{
    outline:none;
    border-color:#555;
}

    
.back{
    color:white;
    text-decoration:none;
    display:inline-block;
    margin-bottom:20px;
}

.card{
    background:#1d1d1d;
    padding:20px;
    margin:15px 0;
    border-radius:10px;
}

.card-description{
    color:#aaa;
    font-size:0.9em;
    margin-top:10px;
    line-height:1.4;
}

.card-date{
    color:#777;
    font-size:0.8em;
    margin-top:10px;
}

.button{
    display:inline-block;
    background:#333;
    color:white;
    text-decoration:none;
    padding:10px 15px;
    border-radius:6px;
    margin-right:10px;
    margin-top:10px;
}

.button:hover{
    background:#444;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    margin-top:15px;
}

.gallery img{
    width:100%;
    aspect-ratio:1/1;
    object-fit:cover;
    border-radius:8px;
    cursor:pointer;
}

details{
    margin-top:20px;
}

summary{
    cursor:pointer;
    font-size:1.1em;
    font-weight:bold;
    padding:12px;
    background:#222;
    border-radius:8px;
}

summary:hover{
    background:#2a2a2a;
}
</style>
</head>

<body>

<section>

<a class="back" href="index.html">◀ Home</a>

    <h1 id="pageTitle">Loading...</h1>

<div class="info-bar">

<p id="paperCount"></p>

<select id="sortSelect">

<option value="az">A-Z</option>
<option value="za">Z-A</option>

<option value="newest">Newest</option>
<option value="oldest">Oldest</option>

<option value="mostimages">Most Images</option>
<option value="leastimages">Least Images</option>

</select>

</div>



<div id="research-container"></div>

</section>

<script>
const params =
    new URLSearchParams(window.location.search);

const currentCategory =
    params.get("category");

    const scrollKey =
    "categoryScroll-" + currentCategory;
    const returning =
    sessionStorage.getItem("returnFromPage") === "yes";
if(!returning){

    sessionStorage.removeItem(scrollKey);

    sessionStorage.removeItem(
        "openDetails-" + currentCategory
    );

}
    
document.querySelector("h1").textContent =
    currentCategory === "all"
        ? "All Research"
        : currentCategory.charAt(0).toUpperCase() +
          currentCategory.slice(1);
fetch("descriptions.json")
.then(response => response.json())
.then(data => {

    const container =
        document.getElementById("research-container");

    let papers =
    Object.entries(data);

    papers.sort((a,b)=>
        a[1].title.localeCompare(b[1].title)
    );
function renderPapers(){

container.innerHTML = "";

let filteredPapers = papers.filter(([key,paper]) =>

    currentCategory === "all" ||

    (
        paper.category &&
        paper.category.includes(currentCategory)
    )

);

const sortType =
    document.getElementById("sortSelect").value;

if(sortType === "az"){

    filteredPapers.sort((a,b)=>
        a[1].title.localeCompare(b[1].title)
    );

}
else if(sortType === "za"){

    filteredPapers.sort((a,b)=>
        b[1].title.localeCompare(a[1].title)
    );

}
else if(sortType === "newest"){

    filteredPapers.sort((a,b)=>
        b[1].updated.localeCompare(a[1].updated)
    );

}
else if(sortType === "oldest"){

    filteredPapers.sort((a,b)=>
        a[1].updated.localeCompare(b[1].updated)
    );

}
else if(sortType === "mostimages"){

    filteredPapers.sort((a,b)=>
        (b[1].images?.length || 0) -
        (a[1].images?.length || 0)
    );

}
else if(sortType === "leastimages"){

    filteredPapers.sort((a,b)=>
        (a[1].images?.length || 0) -
        (b[1].images?.length || 0)
    );

}

document.getElementById("paperCount").textContent =
    filteredPapers.length +
    (filteredPapers.length === 1 ? " Paper" : " Papers");

filteredPapers.forEach(([key,paper]) => {
if(
    currentCategory !== "all" &&
    (
        !paper.category ||
        !paper.category.includes(currentCategory)
    )
){
    return;
}
        let galleryHtml = "";

        if(paper.images && paper.images.length){

            galleryHtml = `
                <details class="image-details" data-paper="${key}">
                    <summary>Supporting Images (${paper.images.length})</summary>

                    <div class="gallery">

                     ${paper.images.map(image => `
    <a
        href="image.html?image=${encodeURIComponent(image)}&paper=${encodeURIComponent(paper.title)}&return=${encodeURIComponent(window.location.href)}"
        class="gallery-image"
        data-scroll-key="${scrollKey}"
    >
        <img
            src="${image}"
            loading="lazy">
    </a>
`).join("")}

                    </div>
                </details>
            `;

        }

        let cardHtml = "";
const warningAccepted =
    sessionStorage.getItem(
        "warning-" + key
    ) === "accepted";
       

if(
    paper.warning &&
    !warningAccepted
){
            cardHtml = `
            <div class="card">

                <h2>${paper.title}</h2>

                <p class="card-description">
                    ${paper.description}
                </p>

                <p class="card-date">
                    Created: ${parseInt(paper.updated.split("-")[1])}-${
parseInt(paper.updated.split("-")[2])}-${
paper.updated.split("-")[0]}
                </p>

                <div id="warning-${key}">

                   <div style="
    text-align:center;
    padding:15px 10px;
">

    <div style="
        font-size:4.5rem;
        line-height:1;
        margin-bottom:15px;
        filter:drop-shadow(0 0 8px rgba(255,200,0,.35));
    ">
        ⚠️
    </div>

    <p style="
        margin:0 0 20px 0;
        line-height:1.5;
        color:#ddd;
    ">
        This paper and/or its supporting images contain graphic material,
        including depictions of severe injuries, death, or war casualties.
    </p>

    <a class="button"
       href="#"
       onclick="showWarningContent('${key}'); return false;">
       I Understand, Show Content
    </a>

</div>

                </div>

                <div id="content-${key}"
     style="display:none;">

                  <a class="button pdf-link"
   href="pdf.html?file=${encodeURIComponent(paper.url)}&paper=${encodeURIComponent(paper.title)}&return=${encodeURIComponent(window.location.href)}">
   Read PDF
</a>

                    <a class="button"
                       href="${paper.url}"
                       download>
                       Download PDF
                    </a>

                    ${galleryHtml}

                </div>

            </div>
            `;

        }else{

            cardHtml = `
            <div class="card">

                <h2>${paper.title}</h2>

                <p class="card-description">
                    ${paper.description}
                </p>

                <p class="card-date">
                    Created: ${parseInt(paper.updated.split("-")[1])}-${
parseInt(paper.updated.split("-")[2])}-${
paper.updated.split("-")[0]}
                </p>

              <a class="button pdf-link"
   href="pdf.html?file=${encodeURIComponent(paper.url)}&paper=${encodeURIComponent(paper.title)}&return=${encodeURIComponent(window.location.href)}">
   Read PDF
</a>

                <a class="button"
                   href="${paper.url}"
                   download>
                   Download PDF
                </a>

                ${galleryHtml}

            </div>
            `;

        }

        container.innerHTML += cardHtml;
    

});
   if(returning){

    const openDetails =
        JSON.parse(
            sessionStorage.getItem(
                "openDetails-" + currentCategory
            ) || "[]"
        );

    document
        .querySelectorAll(".image-details")
        .forEach(details=>{

            if(openDetails.includes(details.dataset.paper)){

                details.open = true;

            }

        });

}
    
    
    document.querySelectorAll(".gallery-image").forEach(link=>{

  link.addEventListener("click",()=>{

    saveOpenDetails();

    sessionStorage.setItem(
        scrollKey,
        window.scrollY
    );

    sessionStorage.setItem(
    "returnFromPage",
    "yes"
);

});
});
document.querySelectorAll(".pdf-link").forEach(link=>{

    link.addEventListener("click",()=>{

        saveCategoryState();

    });

});
}

const sortSelect =
    document.getElementById("sortSelect");

const savedSort =
    localStorage.getItem("paperSort");

if(savedSort){
    sortSelect.value = savedSort;
}

renderPapers();



sortSelect.addEventListener("change", () => {

    localStorage.setItem(
        "paperSort",
        sortSelect.value
    );

    renderPapers();

});
    



if(returning){

    

    const savedScroll =
        sessionStorage.getItem(scrollKey);

    if(savedScroll){

        requestAnimationFrame(()=>{

            requestAnimationFrame(()=>{

                window.scrollTo(
                    0,
                    parseInt(savedScroll)
                );
               sessionStorage.removeItem(
    "returnFromPage"
);

            });

        });

    }

}


       
function saveOpenDetails(){

    const open = [];

    document.querySelectorAll(".image-details").forEach(details=>{

        if(details.open){

            open.push(details.dataset.paper);

        }

    });

    sessionStorage.setItem(
        "openDetails-" + currentCategory,
        JSON.stringify(open)
    );

}
    function saveCategoryState(){

    saveOpenDetails();

    sessionStorage.setItem(
        scrollKey,
        window.scrollY
    );

    sessionStorage.setItem(
        "returnFromPage",
        "yes"
    );

}
window.showWarningContent = function(key){

    sessionStorage.setItem(
        "warning-" + key,
        "accepted"
    );

    document.getElementById(
        "warning-" + key
    ).style.display = "none";

    document.getElementById(
        "content-" + key
    ).style.display = "block";

};
    });
    

</script>

</body>
</html>
