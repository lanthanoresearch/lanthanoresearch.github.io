<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="./pdfjs/web/text_layer_builder.css">
  <link rel="icon" type="image/png" href="file_000000000c40722f92b1fe6758cb4855.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PDF Viewer</title>

<!--
  PDF.js files to add beside this file:
  pdfjs/pdf.mjs
  pdfjs/pdf.worker.mjs
-->

<style>
:root{
    --bg:#111;
    --panel:#1d1d1d;
    --panel2:#222;
    --text:#eee;
    --muted:#aaa;
    --accent:#3a3a3a;
}
*{box-sizing:border-box}
html,body{
    margin:0;
    height:100%;
    background:var(--bg);
    color:var(--text);
    font-family:Arial,sans-serif;
    overflow:hidden;
}
  .page{
    position:relative;
    margin:0 auto 20px;
    box-shadow:0 0 14px rgba(0,0,0,.4);
    background:white;
}
  .pageCanvas{
    display:block;
}

.textLayer{
    position:absolute;
    left:0;
    top:0;
    width:100%;
    height:100%;
    overflow:hidden;
    opacity:1;
    line-height:1;
    user-select:text;
    cursor:text;
}

.textLayer span{
    position:absolute;
    color:transparent;
    white-space:pre;
    transform-origin:0 0;
    cursor:text;
}

.textLayer ::selection{
    background:rgba(0,120,255,.35);
}
header{
    height:58px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 14px;
    background:#181818;
    border-bottom:1px solid #2d2d2d;
}
#title{
    font-size:1.2rem;
    font-weight:bold;
    overflow:hidden;
    white-space:nowrap;
    text-overflow:ellipsis;
}
button,input{
    background:#2b2b2b;
    color:#fff;
    border:none;
    border-radius:8px;
    padding:8px 12px;
}
button:hover{background:#3a3a3a;cursor:pointer}
#toolbar{
    display:flex;
    gap:8px;
    align-items:center;
    padding:10px;
    background:#1b1b1b;
    border-bottom:1px solid #2d2d2d;
    flex-wrap:wrap;
}
#layout{
    display:flex;
    height:calc(100% - 106px);
}
#sidebar{
    width:240px;
    background:#171717;
    overflow:auto;
    border-right:1px solid #2d2d2d;
}
#thumbs{padding:10px}
.thumb{
    padding:10px;
    margin-bottom:8px;
    background:#222;
    border-radius:8px;
}
#viewer{
    flex:1;
    overflow:auto;
    padding:30px;
    background:#111;
}
.page{
    margin:0 auto 20px;
    box-shadow:0 0 14px rgba(0,0,0,.4);
}
.hidden{display:none}
#menu{
    position:absolute;
    right:10px;
    top:58px;
    background:#222;
    border:1px solid #333;
    border-radius:10px;
    padding:8px;
    display:none;
    min-width:220px;
}
#menu button{
    width:100%;
    text-align:left;
    margin:3px 0;
}
  #searchPopup{

    position:absolute;

    top:108px;

    left:110px;

    display:flex;

    align-items:center;

    gap:8px;

    padding:10px;

    background:#222;

    border:1px solid #444;

    border-radius:10px;

    box-shadow:0 8px 20px rgba(0,0,0,.45);

    z-index:1000;

}

#searchPopup.hidden{

    display:none;

}

#searchPopup input{

    width:220px;

}

#searchResults{

    color:#bbb;

    min-width:70px;

    text-align:center;

}
</style>
</head>
<body>

<header>
<button id="backBtn">◀ Back</button>
<div id="title">Loading PDF...</div>
<button id="menuBtn">☰</button>
</header>

<div id="toolbar">
<button id="togglePages">Pages</button>

<button id="searchButton">🔍 Search</button>

<button id="zoomOut">−</button>
<input id="zoomPercent"
       value="150%"
       style="width:70px;text-align:center">
<button id="zoomIn">+</button>

<button id="fitWidth">Fit Width</button>
<button id="fitPage">Fit Page</button>

<label>Page</label>
<input
    id="pageNumber"
    value="1"
    inputmode="numeric"
    style="width:60px;text-align:center">
<span id="pageCount">/ 0</span>
</div>

<div id="searchPopup" class="hidden">

    <input
    id="searchBox"
    placeholder="Search loading..."
    autocomplete="off"
    disabled>

    <button id="prevResult">▲</button>

    <button id="nextResult">▼</button>

    <span id="searchResults">
        0 of 0
    </span>

</div>

  
<div id="layout">
<div id="sidebar">
<div id="thumbs"></div>
</div>

<div id="viewer"></div>
</div>

<div id="menu">
<button id="downloadBtn">Download PDF</button>
<button id="printBtn">Print</button>
<button id="newTabBtn">Open in New Tab</button>
<button id="copyLinkBtn">Copy Page Link</button>
<button id="fullscreenBtn">Fullscreen</button>
</div>

<script type="module">  

import {
    getDocument,
    GlobalWorkerOptions,
    TextLayer
} from "./pdfjs/build/pdf.mjs";



GlobalWorkerOptions.workerSrc =
    "./pdfjs/build/pdf.worker.mjs";

const params = new URLSearchParams(location.search);
  const returnUrl = params.get("return");
const file = params.get("file");
const title = params.get("paper") || "PDF";

document.getElementById("title").textContent = title;
console.log("File:", file);

const viewer = document.getElementById("viewer");

  const thumbs = document.getElementById("thumbs");
  
  let currentScale = 1.5;
  const zoomLevels = [
    0.25,
    0.5,
    0.75,
    1,
    1.25,
    1.5,
    2,
    3,
    4,
    5
];
const pageViews = [];
  let searchResults = [];
let currentSearch = -1;
  let lastSearchQuery = "";
let pdfDoc = null;
const menu = document.getElementById("menu");
const menuButton = document.getElementById("menuBtn");
try {

  

    console.log("Creating loading task...");

    const loadingTask = getDocument(file);

    console.log("Waiting for PDF...");

    pdfDoc = await loadingTask.promise;
const pdf = pdfDoc;

    console.log("PDF loaded!");

    console.log("Pages:", pdf.numPages);

   document.getElementById("pageCount").textContent =
    "/ " + pdf.numPages;
const pageInput = document.getElementById("pageNumber");

for (let pageNumber = 1; pageNumber <= pdf.numPages; pageNumber++) {

    console.log("Rendering page", pageNumber);

    const page = await pdf.getPage(pageNumber);
  

    const viewport = page.getViewport({
        scale: currentScale
    });

   const pageDiv = document.createElement("div");
pageDiv.className = "page";

pageDiv.style.width = viewport.width + "px";
pageDiv.style.height = viewport.height + "px";

const canvas = document.createElement("canvas");
canvas.className = "pageCanvas";

canvas.width = viewport.width;
canvas.height = viewport.height;

canvas.style.width = viewport.width + "px";
canvas.style.height = viewport.height + "px";

pageDiv.appendChild(canvas);

const textLayerDiv = document.createElement("div");
textLayerDiv.className = "textLayer";
textLayerDiv.style.width = viewport.width + "px";
textLayerDiv.style.height = viewport.height + "px";
pageDiv.appendChild(textLayerDiv);

viewer.appendChild(pageDiv);
pageViews.push({
    page,
    pageDiv,
    canvas,
    textLayerDiv
});
  

  
const ctx = canvas.getContext("2d");

await page.render({
    canvasContext: ctx,
    viewport
}).promise;
 const textContent = await page.getTextContent();
pageViews[pageViews.length - 1].textContent = textContent;
  
const textLayer = new TextLayer({

    textContentSource: textContent,

    container: textLayerDiv,

    viewport: viewport.clone({
        dontFlip: true
    })

});

await textLayer.render();
  console.log(textLayerDiv);
console.log(textLayerDiv.children.length);

}
  const searchBox = document.getElementById("searchBox");

searchBox.disabled = false;
searchBox.placeholder = "Search...";


}





  
catch(err){

    console.error("ERROR:", err);

}
  async function renderAllPages() {

    for (const view of pageViews) {

        const viewport = view.page.getViewport({
            scale: currentScale
        });

        view.pageDiv.style.width = viewport.width + "px";
        view.pageDiv.style.height = viewport.height + "px";

        view.canvas.width = viewport.width;
        view.canvas.height = viewport.height;

        view.canvas.style.width = viewport.width + "px";
        view.canvas.style.height = viewport.height + "px";

        const ctx = view.canvas.getContext("2d");

        await view.page.render({
            canvasContext: ctx,
            viewport
        }).promise;



thumb.width = thumbViewport.width;
thumb.height = thumbViewport.height;

await page.render({
    canvasContext: thumb.getContext("2d"),
    viewport: thumbViewport
}).promise;
      
    }
  document.getElementById("zoomPercent").value =
    Math.round(currentScale * 100) + "%";

}

async function searchPDF(query) {

    searchResults = [];
    currentSearch = -1;

    query = query.trim().toLowerCase();

    if (query === "") return;
  lastSearchQuery = query;

    for (let i = 0; i < pageViews.length; i++) {

        const pageText = pageViews[i].textContent.items
            .map(item => item.str)
            .join(" ")
            .toLowerCase();

        if (pageText.includes(query)) {

            searchResults.push(i);

        }

    }

    if (searchResults.length === 0) {

    currentSearch = -1;

    document.getElementById("searchResults").textContent =
        "0 of 0";

    return;

}

    currentSearch = 0;

    currentSearch = 0;

gotoSearchResult(0);

}


function gotoSearchResult(index) {

    if (searchResults.length === 0)
        return;

    if (index < 0)
        index = searchResults.length - 1;

    if (index >= searchResults.length)
        index = 0;

    currentSearch = index;

    document.getElementById("searchResults").textContent =
        `${currentSearch + 1} of ${searchResults.length}`;

    pageViews[searchResults[currentSearch]].pageDiv.scrollIntoView({
        behavior: "smooth",
        block: "start"
    });

}


  
  document.getElementById("backBtn").addEventListener("click", () => {

    if (returnUrl) {

        location.href = returnUrl;

    } else {

        history.back();

    }

});
  menuButton.addEventListener("click", (event) => {

    event.stopPropagation();

    if (menu.style.display === "block") {

        menu.style.display = "none";

    } else {

        menu.style.display = "block";

    }

});
  menu.addEventListener("click", (event) => {

    event.stopPropagation();

});
  document.addEventListener("click", () => {

    menu.style.display = "none";

});
 document.getElementById("downloadBtn").addEventListener("click", () => {

    const a = document.createElement("a");

    a.href = file;

    // Force a download using the PDF's filename
    a.download = file.split("/").pop();

    document.body.appendChild(a);

    a.click();

    a.remove();

    menu.style.display = "none";

});

document.getElementById("newTabBtn").onclick = () => {
    window.open(file, "_blank");
};

document.getElementById("fullscreenBtn").onclick = () => {
    document.documentElement.requestFullscreen();
};

  document.getElementById("copyLinkBtn").addEventListener("click", async () => {

    try {

        await navigator.clipboard.writeText(window.location.href);

        menu.style.display = "none";

        alert("Link copied to clipboard!");

    } 
    catch (err) {

        console.error(err);

        alert("Failed to copy link.");

    }

});
 document.getElementById("zoomIn").onclick = async () => {

    const next = zoomLevels.find(z => z > currentScale);

    if (!next) return;

    currentScale = next;

    await renderAllPages();

};
  document.getElementById("zoomOut").onclick = async () => {

    const previous = [...zoomLevels]
        .reverse()
        .find(z => z < currentScale);

    if (!previous) return;

    currentScale = previous;

    await renderAllPages();

};
  document.getElementById("fitWidth").onclick = async () => {

    const firstPage = pageViews[0].page;

    const viewport = firstPage.getViewport({
        scale: 1
    });

    // 60 = 30px padding on each side of #viewer
    currentScale = (viewer.clientWidth - 60) / viewport.width;

    await renderAllPages();

};
  document.getElementById("fitPage").onclick = async () => {

    const firstPage = pageViews[0].page;

    const viewport = firstPage.getViewport({
        scale: 1
    });

    const widthScale =
        (viewer.clientWidth - 60) / viewport.width;

    const heightScale =
        (viewer.clientHeight - 60) / viewport.height;

    currentScale = Math.min(widthScale, heightScale);

    await renderAllPages();

};
  const pageInput = document.getElementById("pageNumber");

pageInput.addEventListener("keydown", e => {

    if (e.key !== "Enter") return;

    let page = parseInt(pageInput.value);

    // If it's blank or invalid, go to page 1.
    if (isNaN(page)) {
        page = 1;
    }

    // Clamp to the valid range.
    if (page < 1) {
        page = 1;
    }

    if (page > pageViews.length) {
        page = pageViews.length;
    }

    // Update the text box to the corrected page number.
    pageInput.value = page;

    // Jump to that page.
    pageViews[page - 1].pageDiv.scrollIntoView({
        behavior: "smooth",
        block: "start"
    });

});
  const zoomBox = document.getElementById("zoomPercent");

zoomBox.addEventListener("keydown", async e => {

    if (e.key !== "Enter") return;

    let value = parseFloat(
        zoomBox.value.replace("%", "")
    );

    if (isNaN(value)) {
        value = 100;
    }

    if (value < 25) {
        value = 25;
    }

    if (value > 500) {
        value = 500;
    }

    currentScale = value / 100;

    zoomBox.value = value + "%";

    await renderAllPages();

});
  viewer.addEventListener("scroll", () => {

    let current = 1;

    for (let i = 0; i < pageViews.length; i++) {

        const rect = pageViews[i].pageDiv.getBoundingClientRect();

        if (rect.top < 150)
            current = i + 1;

    }

    document.getElementById("pageNumber").value = current;

});
  const searchBox = document.getElementById("searchBox");
 searchBox.addEventListener("keydown", e => {

    if (e.key !== "Enter")
        return;

    // First search
    const query = searchBox.value.trim().toLowerCase();

if (
    query !== lastSearchQuery ||
    searchResults.length === 0 ||
    currentSearch === -1
) {

    searchPDF(query);
    return;

}

    // Go to next result
    gotoSearchResult(currentSearch + 1);

});

  const searchButton = document.getElementById("searchButton");
const searchPopup = document.getElementById("searchPopup");

searchButton.onclick = e => {

    e.stopPropagation();

    searchPopup.classList.toggle("hidden");

    if (!searchPopup.classList.contains("hidden")) {

        document.getElementById("searchBox").focus();

    }

};
  searchPopup.onclick = e => {

    e.stopPropagation();

};
  document.addEventListener("click", () => {

    searchPopup.classList.add("hidden");

});
  document.getElementById("prevResult").onclick = () => {

    // If the user hasn't searched yet,
    // perform the search first.
    const query = searchBox.value.trim().toLowerCase();

if (
    query !== lastSearchQuery ||
    searchResults.length === 0 ||
    currentSearch === -1
) {

    searchPDF(query);
    return;

}

    gotoSearchResult(currentSearch - 1);

};

  document.getElementById("nextResult").onclick = () => {

    // If the user hasn't searched yet,
    // perform the search first.
   const query = searchBox.value.trim().toLowerCase();

if (
    query !== lastSearchQuery ||
    searchResults.length === 0 ||
    currentSearch === -1
) {

    searchPDF(query);
    return;

}

    gotoSearchResult(currentSearch + 1);

};

  const sidebar = document.getElementById("sidebar");

document.getElementById("togglePages").onclick = () => {

    sidebar.classList.toggle("hidden");

};
</script>


</body>
</html>
