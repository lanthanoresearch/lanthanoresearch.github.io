<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="./pdfjs/web/text_layer_builder.css">
  <link rel="icon" type="image/png" href="file_000000000c40722f92b1fe6758cb4855.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PDF Viewer</title>

<!--
  PDF.js files to add beside this file:
  pdfjs/pdf.mjs
  pdfjs/pdf.worker.mjs
-->

<style>
:root{
    --bg:#111;
    --panel:#1d1d1d;
    --panel2:#222;
    --text:#eee;
    --muted:#aaa;
    --accent:#3a3a3a;
}
*{box-sizing:border-box}
html,body{
    margin:0;
    height:100%;
    background:var(--bg);
    color:var(--text);
    font-family:Arial,sans-serif;
    overflow:hidden;
}
  .page{
    position:relative;
    margin:0 auto 20px;
    box-shadow:0 0 14px rgba(0,0,0,.4);
    background:white;
}
  .pageCanvas{
    display:block;
}

.textLayer{
    position:absolute;
    left:0;
    top:0;
    width:100%;
    height:100%;
    overflow:hidden;
    opacity:1;
    line-height:1;
    user-select:text;
    cursor:text;
}
.btn{
    background:#333;
    color:#fff;
    border:none;
    border-radius:7px;
    padding:9px 12px;
    text-decoration:none;
    cursor:pointer;
}
.textLayer span{
    position:absolute;
    color:transparent;
    white-space:pre;
    transform-origin:0 0;
    cursor:text;
}

.textLayer ::selection{
    background:rgba(0,120,255,.35);
}
header{
    height:58px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 14px;
    background:#181818;
    border-bottom:1px solid #2d2d2d;
}
#title{
    font-size:1.2rem;
    font-weight:bold;
    overflow:hidden;
    white-space:nowrap;
    text-overflow:ellipsis;
}
button,input{
    background:#2b2b2b;
    color:#fff;
    border:none;
    border-radius:8px;
    padding:8px 12px;
}
button:hover{background:#3a3a3a;cursor:pointer}
#toolbar{
    display:flex;
    gap:8px;
    align-items:center;
    padding:10px;
    background:#1b1b1b;
    border-bottom:1px solid #2d2d2d;
    flex-wrap:wrap;
}
#layout{
    height:calc(100% - 106px);
}

#viewer{
    width:100%;
    height:100%;
    overflow:auto;
    padding:30px 30px 90px;
    background:#111;

    display:flex;
    flex-direction:column;
    align-items:center;
}
  .zoomControls{
    display:flex;
    align-items:center;
    gap:6px;
    white-space:nowrap;
    flex-shrink:0;
}
  .pageControls{
    display:flex;
    align-items:center;
    gap:6px;
    white-space:nowrap;
    flex-shrink:0;
}
.page{
    margin:0 auto 20px;
    box-shadow:0 0 14px rgba(0,0,0,.4);
}
.hidden{display:none}
#menu{
    position:absolute;
    right:10px;
    top:58px;
    background:#222;
    border:1px solid #333;
    border-radius:10px;
    padding:8px;
    display:none;
    min-width:220px;
}
#menu button{
    width:100%;
    text-align:left;
    margin:3px 0;
}
  #searchPopup{

    position:absolute;

    top:108px;

    left:110px;

    display:flex;

    align-items:center;

    gap:8px;

    padding:10px;

    background:#222;

    border:1px solid #444;

    border-radius:10px;

    box-shadow:0 8px 20px rgba(0,0,0,.45);

    z-index:1000;

}
#titleBar{
    position:fixed;
    left:0;
    right:0;
    bottom:0;

    background:rgba(24,24,24,.92);

    padding:12px 18px;

    text-align:center;

    z-index:3000;

    border-top:1px solid #333;

    backdrop-filter:blur(6px);
}

#title{
    font-size:18px;
    font-weight:bold;

    overflow:hidden;
    white-space:nowrap;
    text-overflow:ellipsis;
}
#searchPopup.hidden{

    display:none;

}

#searchPopup input{

    width:220px;

}

#searchResults{

    color:#bbb;

    min-width:70px;

    text-align:center;

}
  #loadingOverlay{
    position:absolute;
    inset:106px 0 0 0;   /* below header + toolbar */
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:#111;
    z-index:5000;
}

.spinner{
    width:60px;
    height:60px;
    border:6px solid #333;
    border-top:6px solid #ffffff;
    border-radius:50%;
    animation:spin 0.9s linear infinite;
}
/* ---------- Mobile Search Popup ---------- */

@media (max-width:768px){

    #searchPopup{

        left:10px;
        right:10px;
        top:108px;

        width:auto;

        display:flex;
        flex-wrap:wrap;

        justify-content:center;

        gap:8px;
    }

    #searchPopup input{

        flex:1 1 100%;
        width:100%;
        min-width:0;
    }

    #prevResult,
    #nextResult{

        flex:0 0 auto;
    }

    #searchResults{

        flex:1;
        text-align:center;
        min-width:0;
    }

}
.loadingText{
    margin-top:18px;
    color:#ddd;
    font-size:18px;
}

@keyframes spin{
    from{
        transform:rotate(0deg);
    }
    to{
        transform:rotate(360deg);
    }
}
</style>
</head>
<body>

<header>
<a class="btn" id="backBtn" href="index.html">◀ Back</a>

<div style="flex:1"></div>

<button id="menuBtn">☰</button>
</header>

<div id="toolbar">


<button id="searchButton">🔍 Search</button>

<div class="zoomControls">

    <button id="zoomOut">−</button>

    <input
        id="zoomPercent"
        value="150%"
        style="width:70px;text-align:center">

    <button id="zoomIn">+</button>

</div>

<button id="fitWidth">Fit Width</button>
<button id="fitPage">Fit Page</button>

<div class="pageControls">

    <label>Page</label>

    <input
        id="pageNumber"
        value="1"
        inputmode="numeric"
        style="width:60px;text-align:center">

    <span id="pageCount">of 0</span>

</div>
</div>

<div id="searchPopup" class="hidden">

    <input
        id="searchBox"
        placeholder="Search..."
        autocomplete="off">

    <button id="prevResult">▲</button>

    <button id="nextResult">▼</button>

    <span id="searchResults">
        0 of 0
    </span>

</div>

  
<div id="layout">

    <div id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loadingText">Loading PDF...</div>
    </div>

    <div id="viewer"></div>

</div>
<div id="titleBar">
    <div id="title">Loading PDF...</div>
</div>
<div id="menu">
<button id="downloadBtn">Download PDF</button>

<button id="newTabBtn">Open in New Tab</button>
<button id="copyLinkBtn">Copy Page Link</button>
<button id="fullscreenBtn">Fullscreen</button>
</div>

<script type="module">  

import {
    getDocument,
    GlobalWorkerOptions,
    TextLayer
} from "./pdfjs/build/pdf.mjs";



GlobalWorkerOptions.workerSrc =
    "./pdfjs/build/pdf.worker.mjs";

const p = new URLSearchParams(location.search);

const file = decodeURIComponent(
    p.get("file") || ""
);

const title = decodeURIComponent(
    p.get("paper") || "PDF"
);

const returnPage = decodeURIComponent(
    p.get("return") || "index.html"
);
console.log("returnPage =", returnPage);
document.getElementById("title").textContent = title;
console.log("File:", file);

const viewer = document.getElementById("viewer");
  const loadingOverlay =
    document.getElementById("loadingOverlay");
  let baseScale = 1;
let zoomLevel = 1;
let currentScale = 1;
  function getFitWidthScale(page) {

    const viewport = page.getViewport({
        scale: 1
    });

    const styles = getComputedStyle(viewer);

const width =
    viewer.clientWidth
    - parseFloat(styles.paddingLeft)
    - parseFloat(styles.paddingRight);

return width / viewport.width;

}

function getFitPageScale(page) {

    const viewport = page.getViewport({
        scale: 1
    });

    const widthScale =
        viewer.clientWidth / viewport.width;

    const heightScale =
        viewer.clientHeight / viewport.height;

    return Math.min(widthScale, heightScale);

}
  function updateScale() {

    currentScale = baseScale * zoomLevel;

    document.getElementById("zoomPercent").value =
        Math.round(zoomLevel * 100) + "%";

}
  const zoomLevels = [
    0.25,
    0.5,
    0.75,
    1,
    1.25,
    1.5,
    1.75,
    2,
    2.25,
    2.5,
    2.75,
    3,
    3.25,
    3.5,
    3.75,
    4,
    4.25,
    4.5,
    4.75,
    5
];
const pageViews = [];
  let searchResults = [];
let currentSearch = -1;
  let lastSearchQuery = "";
let pdfDoc = null;
const menu = document.getElementById("menu");
const menuButton = document.getElementById("menuBtn");




  
const backButton =
    document.getElementById("backBtn");

backButton.href =
    returnPage || "index.html";

backButton.addEventListener("click", (e) => {

    e.preventDefault();

    sessionStorage.setItem(
        "restoreSearch",
        "yes"
    );

    sessionStorage.setItem(
        "returnFromPage",
        "yes"
    );

    location.href =
        returnPage || "index.html";

});



  
  
try {

  

    console.log("Creating loading task...");

    const loadingTask = getDocument(file);

    console.log("Waiting for PDF...");

    pdfDoc = await loadingTask.promise;
const pdf = pdfDoc;
  const firstPage = await pdf.getPage(1);

baseScale = getFitWidthScale(firstPage);

zoomLevel = 1;

updateScale();

    console.log("PDF loaded!");

    console.log("Pages:", pdf.numPages);

   document.getElementById("pageCount").textContent =
    "of " + pdf.numPages;
const pageInput = document.getElementById("pageNumber");

for (let pageNumber = 1; pageNumber <= pdf.numPages; pageNumber++) {

    console.log("Rendering page", pageNumber);

    const page = await pdf.getPage(pageNumber);
  

    const viewport = page.getViewport({
        scale: currentScale
    });

   const pageDiv = document.createElement("div");
pageDiv.className = "page";

pageDiv.style.width = viewport.width + "px";
pageDiv.style.height = viewport.height + "px";

const canvas = document.createElement("canvas");
canvas.className = "pageCanvas";

const outputScale = window.devicePixelRatio || 1;

canvas.width = Math.floor(viewport.width * outputScale);
canvas.height = Math.floor(viewport.height * outputScale);

canvas.style.width = viewport.width + "px";
canvas.style.height = viewport.height + "px";

const ctx = canvas.getContext("2d");
ctx.setTransform(outputScale, 0, 0, outputScale, 0, 0);

await page.render({
    canvasContext: ctx,
    viewport
}).promise;

canvas.style.width = viewport.width + "px";
canvas.style.height = viewport.height + "px";

pageDiv.appendChild(canvas);

const textLayerDiv = document.createElement("div");
textLayerDiv.className = "textLayer";
textLayerDiv.style.width = viewport.width + "px";
textLayerDiv.style.height = viewport.height + "px";
pageDiv.appendChild(textLayerDiv);

viewer.appendChild(pageDiv);
pageViews.push({
    page,
    pageDiv,
    canvas,
    textLayerDiv
});

 const textContent = await page.getTextContent();
pageViews[pageViews.length - 1].textContent = textContent;
  
const textLayer = new TextLayer({

    textContentSource: textContent,

    container: textLayerDiv,

    viewport: viewport.clone({
        dontFlip: true
    })

});

await textLayer.render();
  console.log(textLayerDiv);
console.log(textLayerDiv.children.length);

}
  
loadingOverlay.style.display = "none";

}





  
catch(err){
loadingOverlay.style.display = "none";
    console.error("ERROR:", err);

}
  async function renderAllPages() {

    for (const view of pageViews) {

        const viewport = view.page.getViewport({
            scale: currentScale
        });

        view.pageDiv.style.width = viewport.width + "px";
        view.pageDiv.style.height = viewport.height + "px";

      view.textLayerDiv.style.width =
    viewport.width + "px";

view.textLayerDiv.style.height =
    viewport.height + "px";

      
        const outputScale = window.devicePixelRatio || 1;

view.canvas.width = Math.floor(viewport.width * outputScale);
view.canvas.height = Math.floor(viewport.height * outputScale);

view.canvas.style.width = viewport.width + "px";
view.canvas.style.height = viewport.height + "px";

const ctx = view.canvas.getContext("2d");

ctx.setTransform(outputScale, 0, 0, outputScale, 0, 0);

await view.page.render({
    canvasContext: ctx,
    viewport
}).promise;
      
    }
 

}

async function searchPDF(query) {

    searchResults = [];
    currentSearch = -1;

    query = query.trim().toLowerCase();

    if (query === "") return;
  lastSearchQuery = query;

    for (let i = 0; i < pageViews.length; i++) {

        const pageText = pageViews[i].textContent.items
            .map(item => item.str)
            .join(" ")
            .toLowerCase();

        if (pageText.includes(query)) {

            searchResults.push(i);

        }

    }

    if (searchResults.length === 0) {

        alert("No results found.");
        return;

    }

    currentSearch = 0;

    currentSearch = 0;

gotoSearchResult(0);

}


function gotoSearchResult(index) {

    if (searchResults.length === 0)
        return;

    if (index < 0)
        index = searchResults.length - 1;

    if (index >= searchResults.length)
        index = 0;

    currentSearch = index;

    document.getElementById("searchResults").textContent =
        `${currentSearch + 1} of ${searchResults.length}`;

    pageViews[searchResults[currentSearch]].pageDiv.scrollIntoView({
        behavior: "smooth",
        block: "start"
    });

}


  
 
  menuButton.addEventListener("click", (event) => {

    event.stopPropagation();

    if (menu.style.display === "block") {

        menu.style.display = "none";

    } else {

        menu.style.display = "block";

    }

});
  menu.addEventListener("click", (event) => {

    event.stopPropagation();

});
  document.addEventListener("click", () => {

    menu.style.display = "none";

});
 document.getElementById("downloadBtn").addEventListener("click", () => {

    const a = document.createElement("a");

    a.href = file;

    // Force a download using the PDF's filename
    a.download = file.split("/").pop();

    document.body.appendChild(a);

    a.click();

    a.remove();

    menu.style.display = "none";

});

document.getElementById("newTabBtn").onclick = () => {
    window.open(file, "_blank");
};

document.getElementById("fullscreenBtn").onclick = () => {
    document.documentElement.requestFullscreen();
};

  document.getElementById("copyLinkBtn").addEventListener("click", async () => {

    const url = window.location.href;

    menu.style.display = "none";

    // Try the native share sheet first.
    if (navigator.share) {

        try {

            await navigator.share({
                title: document.title,
                text: document.getElementById("title").textContent,
                url: url
            });

            return;

        } catch (err) {

            // User cancelled or sharing failed.
            // Continue to clipboard fallback.
        }

    }

    // Try copying to the clipboard.
    try {

        await navigator.clipboard.writeText(url);

        alert("Link copied to clipboard!");

    } catch (err) {

        // Final fallback if clipboard isn't allowed.
        window.prompt(
            "Copy this link:",
            url
        );

    }

});
 document.getElementById("zoomIn").onclick = async () => {

    const next = zoomLevels.find(z => z > zoomLevel);

if (!next) return;

zoomLevel = next;

updateScale();

await renderAllPages();

};
  document.getElementById("zoomOut").onclick = async () => {

    const previous = [...zoomLevels]
    .reverse()
    .find(z => z < zoomLevel);

if (!previous) return;

zoomLevel = previous;

updateScale();

await renderAllPages();

};
document.getElementById("fitWidth").onclick = async () => {

    baseScale =
        getFitWidthScale(pageViews[0].page);

    zoomLevel = 1;

    updateScale();

    await renderAllPages();

};
 document.getElementById("fitPage").onclick = async () => {

    baseScale =
        getFitPageScale(pageViews[0].page);

    zoomLevel = 1;

    updateScale();

    await renderAllPages();

};
  const pageInput = document.getElementById("pageNumber");

pageInput.addEventListener("keydown", e => {

    if (e.key !== "Enter") return;

    let page = parseInt(pageInput.value);

    // If it's blank or invalid, go to page 1.
    if (isNaN(page)) {
        page = 1;
    }

    // Clamp to the valid range.
    if (page < 1) {
        page = 1;
    }

    if (page > pageViews.length) {
        page = pageViews.length;
    }

    // Update the text box to the corrected page number.
    pageInput.value = page;

    // Jump to that page.
    pageViews[page - 1].pageDiv.scrollIntoView({
        behavior: "smooth",
        block: "start"
    });

});
  const zoomBox = document.getElementById("zoomPercent");

zoomBox.addEventListener("keydown", async e => {

    if (e.key !== "Enter") return;

    let value = parseFloat(
        zoomBox.value.replace("%", "")
    );

    if (isNaN(value)) {
        value = 100;
    }

    if (value < 25) {
        value = 25;
    }

    if (value > 500) {
        value = 500;
    }

    zoomLevel = value / 100;

updateScale();

await renderAllPages();
});
  viewer.addEventListener("scroll", () => {

    let current = 1;

    for (let i = 0; i < pageViews.length; i++) {

        const rect = pageViews[i].pageDiv.getBoundingClientRect();

        if (rect.top < 150)
            current = i + 1;

    }

    document.getElementById("pageNumber").value = current;

});
  const searchBox = document.getElementById("searchBox");
 searchBox.addEventListener("keydown", e => {

    if (e.key !== "Enter")
        return;

    // First search
    const query = searchBox.value.trim().toLowerCase();

if (
    query !== lastSearchQuery ||
    searchResults.length === 0 ||
    currentSearch === -1
) {

    searchPDF(query);
    return;

}

    // Go to next result
    gotoSearchResult(currentSearch + 1);

});

  const searchButton = document.getElementById("searchButton");
const searchPopup = document.getElementById("searchPopup");

searchButton.onclick = e => {

    e.stopPropagation();

    searchPopup.classList.toggle("hidden");

    if (!searchPopup.classList.contains("hidden")) {

        document.getElementById("searchBox").focus();

    }

};
  searchPopup.onclick = e => {

    e.stopPropagation();

};
  document.addEventListener("click", () => {

    searchPopup.classList.add("hidden");

});
  document.getElementById("prevResult").onclick = () => {

    // If the user hasn't searched yet,
    // perform the search first.
    const query = searchBox.value.trim().toLowerCase();

if (
    query !== lastSearchQuery ||
    searchResults.length === 0 ||
    currentSearch === -1
) {

    searchPDF(query);
    return;

}

    gotoSearchResult(currentSearch - 1);

};

  document.getElementById("nextResult").onclick = () => {

    // If the user hasn't searched yet,
    // perform the search first.
   const query = searchBox.value.trim().toLowerCase();

if (
    query !== lastSearchQuery ||
    searchResults.length === 0 ||
    currentSearch === -1
) {

    searchPDF(query);
    return;

}

    gotoSearchResult(currentSearch + 1);

};

  let resizeTimer;

window.addEventListener("resize", () => {

    clearTimeout(resizeTimer);

    resizeTimer = setTimeout(async () => {

        // Only auto-fit phones/tablets.
        if (window.innerWidth <= 768 && pageViews.length) {

           baseScale =
    getFitWidthScale(pageViews[0].page);

updateScale();

await renderAllPages();

        }

    }, 150);

});
</script>


</body>
</html>
