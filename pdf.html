<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="file_000000000c40722f92b1fe6758cb4855.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PDF Viewer</title>

<!--
  PDF.js files to add beside this file:
  pdfjs/pdf.mjs
  pdfjs/pdf.worker.mjs
-->

<style>
:root{
    --bg:#111;
    --panel:#1d1d1d;
    --panel2:#222;
    --text:#eee;
    --muted:#aaa;
    --accent:#3a3a3a;
}
*{box-sizing:border-box}
html,body{
    margin:0;
    height:100%;
    background:var(--bg);
    color:var(--text);
    font-family:Arial,sans-serif;
    overflow:hidden;
}
  .page{
    position:relative;
    margin:0 auto 20px;
    box-shadow:0 0 14px rgba(0,0,0,.4);
    background:white;
}
  .pageCanvas{
    display:block;
}

.textLayer{
    position:absolute;
    inset:0;
    overflow:hidden;
    opacity:1;
    line-height:1;
    user-select:text;
    cursor:text;
}

.textLayer span{
    position:absolute;
    color:transparent;
    white-space:pre;
    transform-origin:0 0;
    cursor:text;
}

.textLayer ::selection{
    background:rgba(0,120,255,.35);
}
header{
    height:58px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 14px;
    background:#181818;
    border-bottom:1px solid #2d2d2d;
}
#title{
    font-size:1.2rem;
    font-weight:bold;
    overflow:hidden;
    white-space:nowrap;
    text-overflow:ellipsis;
}
button,input{
    background:#2b2b2b;
    color:#fff;
    border:none;
    border-radius:8px;
    padding:8px 12px;
}
button:hover{background:#3a3a3a;cursor:pointer}
#toolbar{
    display:flex;
    gap:8px;
    align-items:center;
    padding:10px;
    background:#1b1b1b;
    border-bottom:1px solid #2d2d2d;
    flex-wrap:wrap;
}
#layout{
    display:flex;
    height:calc(100% - 106px);
}
#sidebar{
    width:240px;
    background:#171717;
    overflow:auto;
    border-right:1px solid #2d2d2d;
}
#thumbs{padding:10px}
.thumb{
    padding:10px;
    margin-bottom:8px;
    background:#222;
    border-radius:8px;
}
#viewer{
    flex:1;
    overflow:auto;
    padding:30px;
    background:#111;
}
.page{
    margin:0 auto 20px;
    box-shadow:0 0 14px rgba(0,0,0,.4);
}
.hidden{display:none}
#menu{
    position:absolute;
    right:10px;
    top:58px;
    background:#222;
    border:1px solid #333;
    border-radius:10px;
    padding:8px;
    display:none;
    min-width:220px;
}
#menu button{
    width:100%;
    text-align:left;
    margin:3px 0;
}
</style>
</head>
<body>

<header>
<button id="backBtn">◀ Back</button>
<div id="title">Loading PDF...</div>
<button id="menuBtn">☰</button>
</header>

<div id="toolbar">
<button id="togglePages">Pages</button>

<input id="searchBox" placeholder="Search">

<button id="zoomOut">−</button>
<input id="zoomPercent" value="100%" style="width:70px;text-align:center">
<button id="zoomIn">+</button>

<button id="fitWidth">Fit Width</button>
<button id="fitPage">Fit Page</button>

<label>Page</label>
<input id="pageNumber" value="1" style="width:60px;text-align:center">
<span id="pageCount">/ 0</span>
</div>

<div id="layout">
<div id="sidebar">
<div id="thumbs"></div>
</div>

<div id="viewer"></div>
</div>

<div id="menu">
<button id="downloadBtn">Download PDF</button>
<button id="printBtn">Print</button>
<button id="newTabBtn">Open in New Tab</button>
<button id="copyLinkBtn">Copy Page Link</button>
<button id="fullscreenBtn">Fullscreen</button>
</div>

<script type="module">  

import {
    getDocument,
    GlobalWorkerOptions,
    TextLayer
} from "./pdfjs/build/pdf.mjs";

console.log("PDF.js:", pdfjsLib.version);

GlobalWorkerOptions.workerSrc =
    "./pdfjs/build/pdf.worker.mjs";

const params = new URLSearchParams(location.search);
  const returnUrl = params.get("return");
const file = params.get("file");
const title = params.get("paper") || "PDF";

document.getElementById("title").textContent = title;
console.log("File:", file);

const viewer = document.getElementById("viewer");
const menu = document.getElementById("menu");
const menuButton = document.getElementById("menuBtn");
try {

    console.log("Creating loading task...");

    const loadingTask = getDocument(file);

    console.log("Waiting for PDF...");

    const pdf = await loadingTask.promise;

    console.log("PDF loaded!");

    console.log("Pages:", pdf.numPages);

   document.getElementById("pageCount").textContent =
    "/ " + pdf.numPages;

for (let pageNumber = 1; pageNumber <= pdf.numPages; pageNumber++) {

    console.log("Rendering page", pageNumber);

    const page = await pdf.getPage(pageNumber);

    const viewport = page.getViewport({
        scale: 1.5
    });

   const pageDiv = document.createElement("div");
pageDiv.className = "page";

pageDiv.style.width = viewport.width + "px";
pageDiv.style.height = viewport.height + "px";

const canvas = document.createElement("canvas");
canvas.className = "pageCanvas";

canvas.width = viewport.width;
canvas.height = viewport.height;

pageDiv.appendChild(canvas);

const textLayerDiv = document.createElement("div");
textLayerDiv.className = "textLayer";

pageDiv.appendChild(textLayerDiv);

viewer.appendChild(pageDiv);

const ctx = canvas.getContext("2d");

await page.render({
    canvasContext: ctx,
    viewport
}).promise;
 const textContent = await page.getTextContent();

const textLayer = new TextLayer({

    textContentSource: textContent,

    container: textLayerDiv,

    viewport: viewport.clone({
        dontFlip: true
    })

});

await textLayer.render();

}

console.log("Finished!");
}
catch(err){

    console.error("ERROR:", err);

}
  document.getElementById("backBtn").addEventListener("click", () => {

    if (returnUrl) {

        location.href = returnUrl;

    } else {

        history.back();

    }

});
  menuButton.addEventListener("click", (event) => {

    event.stopPropagation();

    if (menu.style.display === "block") {

        menu.style.display = "none";

    } else {

        menu.style.display = "block";

    }

});
  menu.addEventListener("click", (event) => {

    event.stopPropagation();

});
  document.addEventListener("click", () => {

    menu.style.display = "none";

});
 document.getElementById("downloadBtn").addEventListener("click", () => {

    const a = document.createElement("a");

    a.href = file;

    // Force a download using the PDF's filename
    a.download = file.split("/").pop();

    document.body.appendChild(a);

    a.click();

    a.remove();

    menu.style.display = "none";

});

document.getElementById("newTabBtn").onclick = () => {
    window.open(file, "_blank");
};

document.getElementById("fullscreenBtn").onclick = () => {
    document.documentElement.requestFullscreen();
};

  document.getElementById("copyLinkBtn").addEventListener("click", async () => {

    try {

        await navigator.clipboard.writeText(window.location.href);

        menu.style.display = "none";

        alert("Link copied to clipboard!");

    } catch (err) {

        console.error(err);

        alert("Failed to copy link.");

    }

});
</script>


</body>
</html>
