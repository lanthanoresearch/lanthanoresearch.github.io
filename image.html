<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Advanced Image Viewer</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;height:100%;background:#111;color:#eee;font-family:Arial,sans-serif;overflow:hidden}
body{display:flex;flex-direction:column}
header{background:#1b1b1b;border-bottom:1px solid #333;padding:8px}
.top{display:flex;justify-content:space-between;align-items:center;gap:8px}
.title{margin-top:6px;text-align:center;font-weight:bold;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.controls{display:flex;gap:6px;flex-wrap:wrap}
.btn{background:#333;color:#fff;border:none;border-radius:7px;padding:9px 12px;text-decoration:none;cursor:pointer}
#nav{display:flex;justify-content:space-between;padding:8px;background:#181818}
#viewer{flex:1;position:relative;overflow:hidden;touch-action:none}
#img{position:absolute;left:50%;top:50%;transform-origin:center center;user-select:none;-webkit-user-drag:none;max-width:none}
#zoomBar{display:flex;justify-content:center;gap:8px;padding:8px;background:#181818}
#zoom{

    display:flex;
    align-items:center;

    position:relative;
    top:3px;

    min-width:60px;
    justify-content:center;

}
 @media(max-width:700px){
 .top{align-items:flex-start}
 .controls .btn{padding:8px 10px;font-size:.9rem}
 .title{font-size:.95rem}
}
</style>
</head>
<body>
<header>
<div class="top">
<a class="btn" id="homeButton" href="index.html">◀ Home</a>
<div class="controls">

<a
    class="btn"
    id="pdfButton"
    target="_blank"
>
    PDF
</a>

<a
    class="btn"
    id="downloadButton"
    download
>
    Download
</a>

<button
    class="btn"
    id="fullBtn"
>
    ⛶
</button>

</div>
</div>
<div class="title" id="title">Loading...</div>
</header>

<div id="nav">
<button class="btn" id="prevButton">◀ Previous</button>
<button class="btn" id="nextButton">Next ▶</button>
</div>

<div id="viewer"><img id="img"></div>

<div id="zoomBar">
<button class="btn" id="minus">−</button>
<div id="zoom">100%</div>
<button class="btn" id="plus">+</button>
<button class="btn" id="fit">Fit</button>
<button class="btn" id="lock">↕ Free</button>
</div>

<script>
// NOTE: Replace this navigation section with your existing descriptions.json logic.
const p = new URLSearchParams(location.search);

const img = document.getElementById("img");
const viewer = document.getElementById("viewer");
const title = document.getElementById("title");

const fitButton = document.getElementById("fit");
const lockButton = document.getElementById("lock");
const minusButton = document.getElementById("minus");
const plusButton = document.getElementById("plus");

const src = decodeURIComponent(p.get("image") || "");
 const returnPage = decodeURIComponent(
    p.get("return") || "index.html"
);

const homeButton =
    document.getElementById("homeButton");

homeButton.href = returnPage;
 homeButton.addEventListener("click", (e) => {

    e.preventDefault();

    sessionStorage.setItem(
        "restoreSearch",
        "yes"
    );

    location.href = returnPage;

});
 fetch("descriptions.json")
.then(r=>r.json())
.then(data=>{

    let paper=null;

    Object.values(data).forEach(p=>{

        if(!p.images) return;

        if(p.images.includes(src)){
            paper=p;
        }

    });

    if(!paper) return;

    document.getElementById("pdfButton").href =
        paper.url;

    document.getElementById("downloadButton").href =
        src;

});
img.src=src;
title.textContent=src.split("/").pop();
//MOVING SCROLLING ETC.
let base = 1;
let zoom = 1;

let x = 0;
let y = 0;

let verticalLock = false;

const zoomLabel =
    document.getElementById("zoom");

function clampZoom(){

    zoom = Math.max(
        0.05,
        Math.min(15, zoom)
    );

}

function draw(){

    clampZoom();

    img.style.transform =
        `translate(calc(-50% + ${x}px), calc(-50% + ${y}px)) scale(${base * zoom})`;

    zoomLabel.textContent =
        Math.round(zoom * 100) + "%";

}

function fit(){

    if(!img.naturalWidth) return;

    base = Math.min(

        viewer.clientWidth /
            img.naturalWidth,

        viewer.clientHeight /
            img.naturalHeight

    );

    zoom = 1;

    x = 0;
    y = 0;

    img.style.transition =
        "transform .25s";

    draw();

    setTimeout(()=>{

        img.style.transition="";

    },250);

}

img.onload = fit;

window.addEventListener(
    "resize",
    fit
);

minusButton.onclick = ()=>{

    zoom /= 1.1;

    draw();

};

plusButton.onclick = ()=>{

    zoom *= 1.1;

    draw();

};

fitButton.onclick = fit;

lockButton.onclick = ()=>{

    verticalLock =
        !verticalLock;

    lockButton.textContent =

        verticalLock

        ? "↕ Vertical"

        : "↕ Free";

};

    // FIRST HALF... ^^^^^

// ===============================
// POINTER EVENT INTERACTION ENGINE
// ===============================

const pointers = new Map();

let lastTap = 0;

let startX = 0;
let startY = 0;

let pinchStartDistance = 0;
let pinchStartZoom = 1;

function getDistance(a,b){

    return Math.hypot(
        a.x-b.x,
        a.y-b.y
    );

}

function getCenter(a,b){

    return{

        x:(a.x+b.x)/2,
        y:(a.y+b.y)/2

    };

}

viewer.onpointerdown=e=>{

    viewer.setPointerCapture(e.pointerId);

    pointers.set(
        e.pointerId,
        {
            x:e.clientX,
            y:e.clientY
        }
    );

    if(pointers.size===1){

        startX=e.clientX;
        startY=e.clientY;

    }

    if(pointers.size===2){

        const pts=[...pointers.values()];

        pinchStartDistance=
            getDistance(
                pts[0],
                pts[1]
            );

        pinchStartZoom=
            zoom;

    }

};

viewer.onpointermove=e=>{

    if(!pointers.has(e.pointerId))
        return;

    const old=
        pointers.get(e.pointerId);

    pointers.set(
        e.pointerId,
        {
            x:e.clientX,
            y:e.clientY
        }
    );

    if(pointers.size===1){

        let dx=
            e.clientX-old.x;

        let dy=
            e.clientY-old.y;

        if(!verticalLock){

            x+=dx;

        }

        y+=dy;

        draw();

        return;

    }

    if(pointers.size===2){

        const pts=[...pointers.values()];

        const dist=
            getDistance(
                pts[0],
                pts[1]
            );

        zoom=
            pinchStartZoom*
            dist/
            pinchStartDistance;

        draw();

    }

};

viewer.onpointerup=e=>{

    pointers.delete(
        e.pointerId
    );

};

viewer.onpointercancel=e=>{

    pointers.delete(
        e.pointerId
    );

};

viewer.onwheel=e=>{

    e.preventDefault();

    const factor=
        e.deltaY<0
        ?1.08
        :.92;

    zoom*=factor;

    draw();

};

viewer.addEventListener(
    "dblclick",
    e=>{

        if(zoom<2){

            zoom=2;

        }else{

            fit();

            return;

        }

        draw();

    }
);

viewer.addEventListener(
    "touchend",
    e=>{

        const now=
            Date.now();

        if(
            now-lastTap<
            300
        ){

            if(zoom<2){

                zoom=2;

            }else{

                fit();

                return;

            }

            draw();

        }

        lastTap=now;

    }
);

document.addEventListener(
    "keydown",
    e=>{

        switch(e.key){

            case "+":
            case "=":

                zoom*=1.1;
                draw();
                break;

            case "-":

                zoom/=1.1;
                draw();
                break;

            case "0":

                fit();
                break;

            case "ArrowLeft":

                prevButton.click();
                break;

            case "ArrowRight":

                nextButton.click();
                break;

            case "f":
            case "F":

                fullBtn.click();
                break;

        }

    }
);

fit();

    //MOVINF SCROLLING ETC.^^^^^

    

fullBtn.onclick=()=>document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen();

// TODO: reconnect previous/next using your existing code from the old image.html.
prevButton.onclick=()=>alert("Reconnect previous image logic from your existing image.html");
nextButton.onclick=()=>alert("Reconnect next image logic from your existing image.html");
</script>
</body>
</html>
