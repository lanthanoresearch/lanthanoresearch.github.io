<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Advanced Image Viewer</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;height:100%;background:#111;color:#eee;font-family:Arial,sans-serif;overflow:hidden}
body{display:flex;flex-direction:column}
header{background:#1b1b1b;border-bottom:1px solid #333;padding:8px}
.top{display:flex;justify-content:space-between;align-items:center;gap:8px}
.title{margin-top:6px;text-align:center;font-weight:bold;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.controls{display:flex;gap:6px;flex-wrap:wrap}
.btn{background:#333;color:#fff;border:none;border-radius:7px;padding:9px 12px;text-decoration:none;cursor:pointer}
#nav{display:flex;justify-content:space-between;padding:8px;background:#181818}
#viewer{flex:1;position:relative;overflow:hidden;touch-action:none}
#img{position:absolute;left:50%;top:50%;transform-origin:center center;user-select:none;-webkit-user-drag:none;max-width:none}
#zoomBar{display:flex;justify-content:center;gap:8px;padding:8px;background:#181818}
@media(max-width:700px){
 .top{align-items:flex-start}
 .controls .btn{padding:8px 10px;font-size:.9rem}
 .title{font-size:.95rem}
}
</style>
</head>
<body>
<header>
<div class="top">
<a class="btn" id="homeButton" href="index.html">◀ Home</a>
<div class="controls">

<a
    class="btn"
    id="pdfButton"
    target="_blank"
>
    PDF
</a>

<a
    class="btn"
    id="downloadButton"
    download
>
    Download
</a>

<button
    class="btn"
    id="fullBtn"
>
    ⛶
</button>

</div>
</div>
<div class="title" id="title">Loading...</div>
</header>

<div id="nav">
<button class="btn" id="prevButton">◀ Previous</button>
<button class="btn" id="nextButton">Next ▶</button>
</div>

<div id="viewer"><img id="img"></div>

<div id="zoomBar">
<button class="btn" id="minus">−</button>
<div id="zoom">100%</div>
<button class="btn" id="plus">+</button>
<button class="btn" id="fit">Fit</button>
<button class="btn" id="lock">↕ Free</button>
</div>

<script>
// NOTE: Replace this navigation section with your existing descriptions.json logic.
const p=new URLSearchParams(location.search);
const img=document.getElementById("img");
const viewer=document.getElementById("viewer");
const title=document.getElementById("title");
const src=decodeURIComponent(p.get("image")||"");
 fetch("descriptions.json")
.then(r=>r.json())
.then(data=>{

    let paper=null;

    Object.values(data).forEach(p=>{

        if(!p.images) return;

        if(p.images.includes(src)){
            paper=p;
        }

    });

    if(!paper) return;

    document.getElementById("pdfButton").href =
        paper.url;

    document.getElementById("downloadButton").href =
        src;

});
img.src=src;
title.textContent=src.split("/").pop();
fetch("descriptions.json")
.then(r=>r.json())
.then(data=>{

    let foundPaper=null;

    Object.values(data).forEach(paper=>{

        if(!paper.images) return;

        if(paper.images.includes(src)){
            foundPaper=paper;
        }

    });

    if(!foundPaper) return;

    document.getElementById("pdfButton").href=
        foundPaper.url;

    document.getElementById("downloadButton").href=
        src;

});
let base=1,zoom=1,x=0,y=0,lock=false;
const z=document.getElementById("zoom");
function draw(){
 img.style.transform=`translate(calc(-50% + ${x}px),calc(-50% + ${y}px)) scale(${base*zoom})`;
 z.textContent=Math.round(base*zoom*100)+"%";
}
function fit(){
 if(!img.naturalWidth)return;
 base=Math.min(viewer.clientWidth/img.naturalWidth,viewer.clientHeight/img.naturalHeight);
 zoom=1;

x=0;
y=0;

img.style.transition="transform .25s";

draw();

setTimeout(()=>{
    img.style.transition="";
},250);
 draw();
}
 document.getElementById("fit").onclick = fit; 
img.onload=fit;
window.onresize=fit;

minus.onclick=()=>{zoom/=1.1;draw()}
plus.onclick=()=>{zoom*=1.1;draw()}
fit.onclick=fit;
document.getElementById("lock").onclick=()=>{

    lock=!lock;

    document.getElementById("lock").textContent =
        lock
            ? "↕ Locked"
            : "↕ Free";

};
 lock=!lock;
 document.getElementById("lock").textContent=lock?"↕ Vertical":"↕ Free";
};

let drag=false,sx=0,sy=0;
viewer.onpointerdown=e=>{drag=true;sx=e.clientX;sy=e.clientY;viewer.setPointerCapture(e.pointerId);}
viewer.onpointermove=e=>{

    if(!drag)return;

    let dx=e.clientX-sx;
    let dy=e.clientY-sy;

    if(lock){

        x=x;

    }else{

        x+=dx;

    }

    y+=dy;

    sx=e.clientX;
    sy=e.clientY;

    draw();

};
viewer.onpointerup=()=>drag=false;
viewer.onwheel=e=>{e.preventDefault();zoom*=e.deltaY<0?1.08:.92;draw();}
let startDist=null;
viewer.addEventListener("touchmove",e=>{
 if(e.touches.length!=2)return;
 e.preventDefault();
 const dx=e.touches[0].clientX-e.touches[1].clientX;
 const dy=e.touches[0].clientY-e.touches[1].clientY;
 const d=Math.hypot(dx,dy);
 if(startDist===null){startDist=d;return;}
 zoom*=d/startDist;
 startDist=d;
 draw();
},{passive:false});
viewer.addEventListener("touchend",()=>startDist=null);

fullBtn.onclick=()=>document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen();

// TODO: reconnect previous/next using your existing code from the old image.html.
prevButton.onclick=()=>alert("Reconnect previous image logic from your existing image.html");
nextButton.onclick=()=>alert("Reconnect next image logic from your existing image.html");
</script>
</body>
</html>
