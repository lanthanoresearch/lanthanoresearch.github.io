<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Advanced Image Viewer</title>

<!--
NOTE:
This is a starter replacement for image.html.
Replace the JavaScript data-loading section with the one from your current file if needed.
-->

<style>
html,body{
    margin:0;
    height:100%;
    background:#111;
    color:#eee;
    font-family:Arial,sans-serif;
    overflow:hidden;
}
body{
    display:flex;
    flex-direction:column;
}
header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    padding:10px 14px;
    background:#1b1b1b;
    border-bottom:1px solid #333;
}
.left,.right{
    display:flex;
    gap:8px;
    align-items:center;
}
.button{
    background:#333;
    color:#fff;
    border:none;
    border-radius:8px;
    padding:10px 14px;
    cursor:pointer;
    text-decoration:none;
}
.button:hover{background:#444;}
#title{
    flex:1;
    text-align:center;
    font-weight:bold;
}
#nav{
    display:flex;
    justify-content:space-between;
    padding:10px;
    background:#171717;
    border-bottom:1px solid #333;
}
#viewer{
    flex:1;
    position:relative;
    overflow:hidden;
    touch-action:none;
    background:#111;
}
#img{
    position:absolute;
    left:50%;
    top:50%;
    transform-origin:center center;
    user-select:none;
    -webkit-user-drag:none;
    max-width:none;
    max-height:none;
}
#zoomBar{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    padding:10px;
    background:#171717;
    border-top:1px solid #333;
}
#zoomLabel{
    width:70px;
    text-align:center;
}
</style>
</head>
<body>

<header>
<div class="left">
<a id="homeButton" class="button" href="index.html">◀ Home</a>
</div>

<div id="title">Loading...</div>

<div class="right">
<a id="pdfButton" class="button" target="_blank">PDF</a>
<a id="downloadButton" class="button" download>Download</a>
<button class="button" id="fullscreenBtn">Fullscreen</button>
</div>
</header>

<div id="nav">
<button class="button" id="prevButton">◀ Previous</button>
<button class="button" id="nextButton">Next ▶</button>
</div>

<div id="viewer">
<img id="img" draggable="false">
</div>

<div id="zoomBar">
<button class="button" id="zoomOut">−</button>
<div id="zoomLabel">100%</div>
<button class="button" id="zoomIn">+</button>
<button class="button" id="fitButton">Fit</button>
</div>

<script>
const params=new URLSearchParams(location.search);
const image=params.get("image");
if(image){
    document.getElementById("img").src=decodeURIComponent(image);
    document.getElementById("downloadButton").href=decodeURIComponent(image);
    document.getElementById("title").textContent=
        decodeURIComponent(image).split("/").pop();
}

const img=document.getElementById("img");
const viewer=document.getElementById("viewer");
const label=document.getElementById("zoomLabel");

let scale=1;
let baseScale=1;
let x=0;
let y=0;
let dragging=false,startX=0,startY=0;

function apply(){
    img.style.transform=
        `translate(calc(-50% + ${x}px),calc(-50% + ${y}px)) scale(${baseScale*scale})`;
    label.textContent=Math.round(baseScale*scale*100)+"%";
}

function fit(){
    if(!img.naturalWidth)return;
    const vw=viewer.clientWidth;
    const vh=viewer.clientHeight;
    baseScale=Math.min(vw/img.naturalWidth,vh/img.naturalHeight);
    x=0;
    y=0;
    scale=1;
    apply();
}

img.onload=fit;
window.addEventListener("resize",fit);

document.getElementById("zoomIn").onclick=()=>{scale*=1.1;apply();};
document.getElementById("zoomOut").onclick=()=>{scale/=1.1;apply();};
document.getElementById("fitButton").onclick=fit;

viewer.addEventListener("wheel",e=>{
    e.preventDefault();
    scale*=e.deltaY<0?1.1:0.9;
    apply();
},{passive:false});

viewer.addEventListener("pointerdown",e=>{
    dragging=true;
    startX=e.clientX;
    startY=e.clientY;
    viewer.setPointerCapture(e.pointerId);
});
viewer.addEventListener("pointermove",e=>{
    if(!dragging)return;
    x+=e.clientX-startX;
    y+=e.clientY-startY;
    startX=e.clientX;
    startY=e.clientY;
    apply();
});
viewer.addEventListener("pointerup",()=>dragging=false);
viewer.addEventListener("dblclick",()=>{
    scale=scale===1?2:1;
    apply();
});

let pinchStart=null;
viewer.addEventListener("touchmove",e=>{
    if(e.touches.length!==2)return;
    e.preventDefault();
    const dx=e.touches[0].clientX-e.touches[1].clientX;
    const dy=e.touches[0].clientY-e.touches[1].clientY;
    const dist=Math.hypot(dx,dy);
    if(pinchStart===null){pinchStart=dist;return;}
    scale*=dist/pinchStart;
    pinchStart=dist;
    apply();
},{passive:false});
viewer.addEventListener("touchend",()=>pinchStart=null);

document.getElementById("fullscreenBtn").onclick=()=>{
    if(!document.fullscreenElement){
        document.documentElement.requestFullscreen();
    }else{
        document.exitFullscreen();
    }
};
</script>
</body>
</html>
