<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Advanced Image Viewer</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;height:100%;background:#111;color:#eee;font-family:Arial,sans-serif;overflow:hidden}
body{display:flex;flex-direction:column}
header{background:#1b1b1b;border-bottom:1px solid #333;padding:8px}
.top{display:flex;justify-content:space-between;align-items:center;gap:8px}
.title{

    padding:8px 15px;

    text-align:center;

    font-weight:bold;

    font-size:1rem;

    white-space:nowrap;

    overflow:hidden;

    text-overflow:ellipsis;

    background:#181818;

    border-top:1px solid #2b2b2b;

}
.controls{display:flex;gap:6px;flex-wrap:wrap}
.btn{background:#333;color:#fff;border:none;border-radius:7px;padding:9px 12px;text-decoration:none;cursor:pointer}
#nav{display:flex;justify-content:space-between;padding:8px;background:#181818}
#viewer{flex:1;position:relative;overflow:hidden;touch-action:none}
#img{position:absolute;left:50%;top:50%;transform-origin:center center;user-select:none;-webkit-user-drag:none;max-width:none}
#zoomBar{display:flex;justify-content:center;gap:8px;padding:8px;background:#181818}
#zoom{

    display:flex;
    align-items:center;

    position:relative;
    top:3px;

    min-width:60px;
    justify-content:center;

}
 @media(max-width:700px){
 .top{align-items:flex-start}
 .controls .btn{padding:8px 10px;font-size:.9rem}
 .title{font-size:.95rem}
}
</style>
</head>
<body>
<header>
<div class="top">
<a class="btn" id="homeButton" href="index.html">◀ Home</a>
<div class="controls">

<a
    class="btn"
    id="pdfButton"
    target="_blank"
>
    PDF
</a>

<a
    class="btn"
    id="downloadButton"
    download
>
    Download
</a>

<button
    class="btn"
    id="fullBtn"
>
    ⛶
</button>

</div>
</div>

</header>

<div id="viewer"><img id="img"></div>
<div class="title" id="title">Loading...</div>
<div id="zoomBar">
<button class="btn" id="minus">−</button>
<div id="zoom">100%</div>
<button class="btn" id="plus">+</button>
<button class="btn" id="fit">Reset</button>
<button class="btn" id="lock">🔓 Free</button>
</div>

<script>
// NOTE: Replace this navigation section with your existing descriptions.json logic.
const p = new URLSearchParams(location.search);

const img = document.getElementById("img");
const viewer = document.getElementById("viewer");
const title = document.getElementById("title");

const fitButton = document.getElementById("fit");
const lockButton = document.getElementById("lock");
const minusButton = document.getElementById("minus");
const plusButton = document.getElementById("plus");

const src = decodeURIComponent(p.get("image") || "");
 const returnPage = decodeURIComponent(
    p.get("return") || "index.html"
);
const fullBtn =
    document.getElementById("fullBtn");
const homeButton =
    document.getElementById("homeButton");

homeButton.href = returnPage;
 homeButton.addEventListener("click", (e) => {

    e.preventDefault();

    sessionStorage.setItem(
        "restoreSearch",
        "yes"
    );

    location.href = returnPage;

});
 fetch("descriptions.json")
.then(r=>r.json())
.then(data=>{

    let paper=null;

    Object.values(data).forEach(p=>{

        if(!p.images) return;

        if(p.images.includes(src)){
            paper=p;
        }

    });

    if(!paper) return;

    document.getElementById("pdfButton").href =
        paper.url;

    document.getElementById("downloadButton").href =
        src;

});
img.src=src;
title.textContent=src.split("/").pop();
//MOVING SCROLLING ETC.

    
    
    
    
    // FIRST HALF... ^^^^^


    // ------------------------
    // One finger = Drag
    // ------------------------

    
// ===============================
// POINTER EVENT INTERACTION ENGINE
// ===============================

let base = 1;
let zoom = 1;

let offsetX = 0;
let offsetY = 0;

let verticalLock = false;

const zoomLabel =
    document.getElementById("zoom");

const pointers = new Map();

let pinchDistance = 0;
let pinchZoom = 1;

let pinchCenter = {
    x: 0,
    y: 0
};

function clampZoom(){

    if(zoom < 0.05){

        zoom = 0.05;

    }

    if(zoom > 50){

        zoom = 50;

    }

}

function draw(){

    clampZoom();

    img.style.transform =
        `translate(calc(-50% + ${offsetX}px), calc(-50% + ${offsetY}px))
         scale(${base * zoom})`;

    zoomLabel.textContent =
        Math.round(zoom * 100) + "%";

}

function fit(){

    if(!img.naturalWidth)
        return;

    base = Math.min(

        viewer.clientWidth /
        img.naturalWidth,

        viewer.clientHeight /
        img.naturalHeight

    );

    zoom = 1;

    offsetX = 0;
    offsetY = 0;

    img.style.transition =
        "transform .22s";

    draw();

    setTimeout(()=>{

        img.style.transition="";

    },220);

}

img.onload = fit;

window.addEventListener(
    "resize",
    fit
);

minusButton.onclick=()=>{

    zoom/=1.1;

    draw();

};

plusButton.onclick=()=>{

    zoom*=1.1;

    draw();

};

fitButton.onclick=fit;

lockButton.onclick=()=>{

    verticalLock=!verticalLock;

    lockButton.textContent=

        verticalLock

        ? "🔒 Vertical"

        : "🔓 Free";

};

    viewer.onpointerdown=e=>{

    viewer.setPointerCapture(
        e.pointerId
    );

    pointers.set(

        e.pointerId,

        {

            x:e.clientX,
            y:e.clientY

        }

    );

   if(pointers.size === 2){

    const pts =
        [...pointers.values()];

    pinchDistance =
        Math.hypot(

            pts[0].x - pts[1].x,

            pts[0].y - pts[1].y

        );

    pinchZoom = zoom;

   pinchCenter = {

    x:
        viewer.clientWidth / 2,

    y:
        viewer.clientHeight / 2

};

}

};
    //MOVINF SCROLLING ETC.^^^^^
viewer.onpointermove = e => {

    if(!pointers.has(e.pointerId))
        return;

    const previous =
        pointers.get(e.pointerId);

    pointers.set(
        e.pointerId,
        {
            x:e.clientX,
            y:e.clientY
        }
    );

    if(pointers.size === 1){

        const dx =
            e.clientX - previous.x;

        const dy =
            e.clientY - previous.y;

        if(!verticalLock){

            offsetX += dx;

        }

        offsetY += dy;

        draw();

        return;

    }

    const pts =
    [...pointers.values()];

const distance =
    Math.hypot(

        pts[0].x - pts[1].x,

        pts[0].y - pts[1].y

    );

const center = {

    x:
        viewer.clientWidth / 2,

    y:
        viewer.clientHeight / 2

};

const oldScale =
    base * zoom;

zoom =
    pinchZoom *
    (distance / pinchDistance);

clampZoom();

const newScale =
    base * zoom;

const ratio =
    newScale / oldScale;

// Keep the current view centered while zooming.
offsetX *= ratio;
offsetY *= ratio;

pinchDistance = distance;
pinchZoom = zoom;

draw();
};

viewer.onpointerup = e => {

    pointers.delete(
        e.pointerId
    );

    if(pointers.size < 2){

        pinchDistance = 0;

    }

};

viewer.onpointercancel = e => {

    pointers.delete(
        e.pointerId
    );

    if(pointers.size < 2){

        pinchDistance = 0;

    }

};
    
draw();
fit();
fullBtn.onclick=()=>document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen();
viewer.addEventListener("wheel", e => {

    e.preventDefault();

    const rect =
        viewer.getBoundingClientRect();

    const mouseX =
        e.clientX - rect.left - rect.width / 2;

    const mouseY =
        e.clientY - rect.top - rect.height / 2;

    const oldScale =
        base * zoom;

    if(e.deltaY < 0){

        zoom *= 1.12;

    }else{

        zoom /= 1.12;

    }

    clampZoom();

    const newScale =
        base * zoom;

    const ratio =
        newScale / oldScale;

    offsetX =
        mouseX -
        (mouseX - offsetX) * ratio;

    offsetY =
        mouseY -
        (mouseY - offsetY) * ratio;

    draw();

}, { passive:false });
// TODO: reconnect previous/next using your existing code from the old image.html.

</script>
</body>
</html>
